<section class="services">

  <div class="container">

    <div class="section-header">
      <h2>Our Services</h2>
      <p>Explore our professional programs designed to enhance brain performance.</p>
    </div>

    <div class="services-grid">

      <div class="service-card"
           *ngFor="let item of services"
           (click)="openInNewTab(item.url)">

        <div class="icon">🧠</div>

        <h3>{{ item.title }}</h3>

        <p>{{ item.description }}</p>

        <span class="link">Learn More →</span>

      </div>

    </div>

  </div>

</section>
