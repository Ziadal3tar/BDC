<section class="about">

  <div class="container about-wrapper">

    <!-- LEFT CONTENT -->
    <div class="about-content">

      <h2>About <span>Brain Development</span></h2>

      <p class="intro">
        We help individuals unlock their full mental potential through structured brain training and coaching programs.
      </p>

      <div class="features">

        <div class="feature" *ngFor="let item of features">
          <div class="icon">🧠</div>
          <div>
            <h4>{{ item.title }}</h4>
            <p>{{ item.desc }}</p>
          </div>
        </div>

      </div>

    </div>

    <!-- RIGHT IMAGE -->
    <div class="about-image">
      <img src="./assets/abouusimg.jpg" alt="About">
    </div>

  </div>

</section>
