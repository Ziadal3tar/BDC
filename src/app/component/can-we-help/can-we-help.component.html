<section class="help">

  <div class="container">

    <div class="section-header">
      <h2>Who Can We Help</h2>
      <p>We provide tailored brain development coaching for different needs and goals.</p>
    </div>

    <owl-carousel-o [options]="customOptions">

      <ng-container *ngFor="let item of WhoCanWeHelp">
        <ng-template carouselSlide>

          <div class="help-card" (click)="openInNewTab(item.url)">

            <div class="image">
              <img src="https://picsum.photos/500/600" alt="">
            </div>

            <div class="content">
              <h3>{{ item.title }}</h3>
              <p>{{ item.description }}</p>
            </div>

          </div>

        </ng-template>
      </ng-container>

    </owl-carousel-o>

  </div>

</section>
