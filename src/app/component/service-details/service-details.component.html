<section class="details">

  <div class="container details-layout">

    <!-- MAIN CONTENT -->
    <div class="content">

      <h1 class="title">{{ disPlay?.title }}</h1>

      <img class="cover" [src]="disPlay?.image" />

      <p class="desc">
        {{ disPlay?.descriptionription }}
      </p>

      <div class="paragraph" *ngFor="let p of disPlay?.paragraphs">

        <h2>{{ p.title }}</h2>

        <img *ngIf="p.image" [src]="p.image" />

        <p>{{ p.description }}</p>

      </div>

    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar" *ngIf="urlPart === 'blog'">

      <h3>Similar Articles</h3>

      <div class="card"
           *ngFor="let item of Similar"
           (click)="toBlog(item.url)"
           [routerLink]="['/blog/',item.url]">

        <img [src]="item.image">

        <div class="info">
          <span>{{ item.createdAt | dateFormat }}</span>
          <p>{{ item.title }}</p>
        </div>

      </div>

    </aside>

  </div>

</section>
